{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Alke Wallet - Clientes</title>
    <link rel="stylesheet" href="{% static 'gestion/css/estilos.css' %}">
</head>

<body>
    <div class="container">
        <h1>Listado de Clientes de Alke Wallet</h1>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for cliente in clientes %}
                <tr>
                    <td>{{ cliente.nombre }}</td>
                    <td>{{ cliente.email }}</td>
                    <td>{{ cliente.telefono }}</td>
                    <td>
                        <a href="{% url 'editar_cliente' cliente.pk %}">Editar</a>
                        <a href="{% url 'eliminar_cliente' cliente.pk %}" style="color: #dc3545; text-decoration: none; font-weight: bold;">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4">No hay clientes registrados aún.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
