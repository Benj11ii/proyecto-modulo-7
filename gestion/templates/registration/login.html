<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alke Wallet - Iniciar Sesión</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        form { display: flex; flex-direction: column; }
        input[type="text"], input[type="password"] { padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; width: calc(100% - 24px); }
        .btn-login { background-color: #3498db; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background-color: #2980b9; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Alke Wallet</h2>
        
        {% if form.errors %}
            <p class="error">Tu usuario y/o contraseña son incorrectos. Por favor, intenta de nuevo.</p>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            <!-- REQUISITO DE SEGURIDAD OBLIGATORIO -->
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>
</body>
</html>
